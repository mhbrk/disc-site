<style>
    /* --- Products panel (local styles) --- */

    /* Card is clickable and used as positioning context */
    #products-list .product-card {
        position: relative;
        cursor: pointer;
    }

    /* Reserve space on the right for the actions strip */
    #products-list .product-card .card-body {
        padding-right: 3.5rem; /* a bit more than the strip width */
    }

    /* Full-height right strip */
    #products-list .product-card .action-container {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    /* Make the button fill the strip */
    #products-list .product-card .action-btn {
        width: 100%;
        height: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    #products-list .product-card .product-menu {
        position: absolute;
        left: 100%; /* anchor menu to the right side of the strip */
        margin-left: 0.1rem; /* little gap */
        min-width: 140px;
        background: #ffffff;
        border-radius: 0.75rem;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
        padding: 0.25rem 0;
        z-index: 10;
    }


    /* Menu item */
    #products-list .product-card .menu-item {
        display: block;
        width: 100%;
        padding: 0.5rem 0.875rem;
        background: transparent;
        border: 0;
        text-align: left;
        font-size: 0.9rem;
        cursor: pointer;
        border-radius: 0.5rem;
    }

    #products-list .product-card .menu-item:hover {
        background-color: #f3f4f6;
    }
</style>


<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0 fw-semibold">Your Products</h5>
    <button type="button" id="create-btn" class="btn btn-primary d-flex align-items-center">
        <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true"></span>
        <span>Create</span>
    </button>
</div>

<template id="product-template">
    <div class="col">
        <div class="card shadow-sm h-100 product-card">
            <div class="card-body p-3">
                <h6 class="card-title mb-0 product-name"></h6>
            </div>

            <!-- Full-height right strip -->
            <div class="action-container">
                <button type="button" class="action-btn" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="20" height="20"
                         fill="currentColor"
                         class="bi bi-three-dots-vertical"
                         viewBox="0 0 16 16">
                        <path d="M9.5 13a1.5 1.5 0 1 1-3 0
                     1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0
                     1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0
                     1.5 1.5 0 0 1 3 0"/>
                    </svg>
                </button>

                <!-- Popout menu -->
                <div class="product-menu d-none">
                    <button class="menu-item text-danger delete-btn" type="button">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>


<div id="products-list" class="row row-cols-1 g-3"></div>

<script>
    const create_product_button = document.getElementById("create-btn");
    const spinner = create_product_button.querySelector(".spinner-border");

    create_product_button.addEventListener("click", () => {
        const chat = document.getElementById('chainlit');
        if (chat) {
            create_product_button.disabled = true;
            spinner.classList.remove("d-none");
            chat.contentWindow.postMessage({
                method: "create_new_product",
                body: ""
            }, '*');
        }
    });

    function renderProduct(product) {
        const template = document.getElementById("product-template");
        const node = template.content.cloneNode(true);

        const col = node.querySelector(".col");
        const card = node.querySelector(".product-card");
        const nameEl = node.querySelector(".product-name");
        const deleteBtn = node.querySelector(".delete-btn");

        nameEl.textContent = product.name;
        card.dataset.productId = product.product_id;
        card.dataset.productName = product.name;
        deleteBtn.dataset.productId = product.product_id;

        if (product.active) {
            card.classList.add("border-primary", "border-2", "bg-primary-subtle");
        }

        return col;
    }


    // Handle update_products_list
    window.addEventListener("message", (event) => {
        if (event.data.method === "update_products_list") {
            let products = event.data.body || [];
            const list = document.getElementById("products-list");
            list.innerHTML = "";

            // Active products first
            products.sort((a, b) => (b.active === true) - (a.active === true));

            products.forEach(product => {
                if (!product.name || !product.product_id) return;
                const cardNode = renderProduct(product);
                list.appendChild(cardNode);
            });
        }
    });

    // Close all menus
    function closeAllMenus() {
        document.querySelectorAll(".product-menu").forEach(m => m.classList.add("d-none"));
    }

    // Toggle on click
    document.getElementById("products-list").addEventListener("click", (e) => {
        const chat = document.getElementById("chainlit");
        if (!chat) return;

        // 1) Clicked delete
        const deleteBtn = e.target.closest(".delete-btn");
        if (deleteBtn) {
            const card = deleteBtn.closest(".product-card");
            const productId = card.dataset.productId;
            const productName = card.dataset.productName;

            if (confirm(`Delete product "${productName}"? This cannot be undone.`)) {
                const chat = document.getElementById('chainlit');
                if (chat) {
                    chat.contentWindow.postMessage({
                        method: "delete_product",
                        body: productId
                    }, '*');
                }
            }

            closeAllMenus();
            return;
        }

        // 2) Clicked in action container?
        const actionContainer = e.target.closest(".action-container");
        if (actionContainer) {
            const menu = actionContainer.querySelector(".product-menu");
            const wasOpen = !menu.classList.contains("d-none");

            closeAllMenus();

            if (!wasOpen) {
                menu.classList.remove("d-none");
            }

            return; // prevent card-select
        }

        closeAllMenus();

        // 4) Finally card-select
        const card = e.target.closest(".product-card");
        if (card) {
            chat.contentWindow.postMessage({
                method: "product_selected",
                body: card.dataset.productId
            }, "*");
        }
    });


</script>
