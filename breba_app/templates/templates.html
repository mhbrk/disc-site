<div id="template-cards" class="d-flex flex-wrap gap-3">
    <!-- Card #1 -->
    <div class="card p-2 col-12 col-xl-6">
        <div class="card-body d-flex flex-column text-center">
            <div class="mb-2">
                <h6 class="card-title text-wrap mb-2">Landing Page With Google Form</h6>
                <p class="card-text small text-wrap mb-4">
                    Great for collecting user input on your landing page.
                </p>
            </div>
            <button class="btn btn-primary btn-sm mt-auto start-template" data-template="landing_with_form">
                Start
            </button>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll(".start-template").forEach(button => {
        button.addEventListener("click", async () => {
            const templateName = button.dataset.template;

            const cards = document.getElementById("template-cards");
            const iframe = document.getElementById("generator-frame");

            // Hide cards and show iframe
            if (cards) cards.style.display = "none";
            if (iframe) iframe.style.display = "block";

            const chat = document.getElementById('chainlit');
            if (chat) {
                chat.contentWindow.postMessage({
                    method: "load_template",
                    body: templateName
                }, '*');
            }
        });
    });
</script>
