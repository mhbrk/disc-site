<div class="d-flex flex-column h-100">

    <div class="card position-relative h-75 overflow-hidden builder-wrapper">
        <textarea id="builder-prompt" class="form-control h-100 no-resize border-0 shadow-none focus-ring-0"></textarea>

        <div id="run-button-wrapper" class="position-absolute top-0 start-0 end-0 m-2 mx-4 d-none">
            <div
                class="d-flex align-items-center justify-content-between gap-3 px-3 py-2 rounded-3 bg-white bg-opacity-75 shadow-sm backdrop-blur w-auto mx-auto">
                <div class="fw-medium">Apply your changes</div>
                <button id="run-button" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <!-- Updates section -->
    <div class="card h-25 mt-2 overflow-hidden flex-shrink-0">
        <div class="card-header">Status Updates</div>
        <div class="card-body overflow-auto">
            <ul id="updates-list" class="list-unstyled mb-0"></ul>
        </div>
    </div>
</div>

<script>
    const textarea = document.getElementById("builder-prompt");
    const runButton = document.getElementById("run-button");
    const runButtonWrapper = document.getElementById("run-button-wrapper");
    let lastServerContent = "";

    // Helper to show/hide
    function updateRunButtonVisibility() {
        if (textarea.value !== lastServerContent) {
            runButtonWrapper.classList.remove('d-none');
        } else {
            runButtonWrapper.classList.add('d-none');
        }
    }

    // Updates to builder panel
    window.addEventListener('message', (event) => {
        if (event.data.method === "to_builder") {
            console.log('Builder panel message:', event.data);
            lastServerContent = event.data.body;
            textarea.value = event.data.body;
            updateRunButtonVisibility();   // hide, since in-sync
        }
    });

    // Detect user edits
    textarea.addEventListener("input", updateRunButtonVisibility);

    // On “Run”, POST the current text to builder
    runButton.addEventListener("click", () => {

        const chat = document.getElementById('chainlit');
        if (chat) {
            const prompt = {
                method: "to_builder",
                body: "This is the final prompt. Just process it. I will not answer any questions: " + textarea.value
            };
            chat.contentWindow.postMessage(prompt, '*');
            lastServerContent = textarea.value;
            updateRunButtonVisibility();
        }
    });

</script>
<style>
    .no-resize {
        resize: none;
    }

    .backdrop-blur {
        backdrop-filter: blur(8px);
    }

    .builder-wrapper {
        border: 2px solid transparent;
    }

    .builder-wrapper:focus-within { 
        border-color: #86b7fe; 
    }

</style>
