<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Breba</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }

            .panel {
                height: auto;
            }

            #input-panel iframe {
                width: 100%;
                border: none;
                height: 100%;
            }

            /* Generator iframe sizing */
            #generator-panel>iframe,
            #generator-frame {
                width: 100%;
                border: 0;
            }

            @media (max-width: 767.98px) {

                #generator-panel>iframe,
                #generator-frame {
                    height: auto;
                    min-height: 66vh;
                    display: block;
                }
            }

            @media (min-width: 768px) {

                #generator-panel>iframe,
                #generator-frame {
                    height: 100%;
                }
            }

            /* Make parent panels tall on small screens so iframe can fill them */
            @media (max-width: 767.98px) {

                #right-panel,
                #generator-panel {
                    min-height: 100vh;
                }

                #generator-panel>iframe,
                #generator-frame {
                    height: auto;
                    min-height: 100vh;
                }

                #generator-panel {
                    overflow: visible !important;
                }
            }

            /* Small screens: left column ~2/3 only when input panel is visible */
            @media (max-width: 767.98px) {
                #left-panels.min-66 {
                    min-height: 66vh;
                }
            }

            #right-panel {
                height: auto;
                /* small screens: let content define height */
            }

            @media (min-width: 768px) {

                /* panels and their container fill viewport height on desktop */
                .panel {
                    height: 100%;
                }

                #left-panels,
                #right-panel {
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                }

                #left-panels .panel,
                #generator-panel {
                    flex: 1 1 auto;
                    min-height: 0;
                }
            }

            /* Normalize sidebar button boxes and icon sizing */
            #sidebar-buttons .btn {
                width: 48px;
                height: 48px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
                border: 0;
                box-shadow: none;
            }

            #sidebar-buttons .btn>.icon {
                font-size: 24px;
                line-height: 1;
            }

            #sidebar-buttons a.btn img {
                width: 24px;
                height: 24px;
            }

            #sidebar-buttons .btn.active {
                background-color: rgba(255, 255, 255, 0.2);
            }

            #sidebar-buttons .btn.active,
            #sidebar-buttons .btn:active {
                border: 0;
                box-shadow: none;
            }

            #sidebar-buttons .btn:focus {
                outline: none;
                box-shadow: none;
            }

            #sidebar-buttons .btn:focus-visible {
                outline: none;
                box-shadow: none;
            }

            #left-panels {
                position: relative;
            }

            #left-panels>.panel-overlay {
                position: absolute;
                inset: calc(var(--bs-gutter-y) * .5) calc(var(--bs-gutter-x) * .5);
                background: white;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                z-index: 2;
                transition: opacity 300ms ease-out, visibility 0s linear 300ms;
                border-radius: .5rem;
            }

            #left-panels.reveal-overlay>.panel-overlay {
                opacity: 1;
                visibility: visible;
                transition: none;
            }
        </style>

    </head>

    <body style="background-color: #c8c9ca;">
        <div id="popup" style="display:none; position:absolute; z-index:1000; background:white;
            border:1px solid #ccc; padding:10px; border-radius:8px;
            width:600px; box-shadow:0 2px 6px rgba(0,0,0,0.2);">
            <div style="display:flex; gap:5px;">
                <input type="text" id="popup-input" placeholder="Type your request. e.g. Explain"
                    class="form-control" />
                <button id="popup-submit" class="btn btn-sm btn-primary">→</button>
            </div>
        </div>

        <div class="container-fluid vh-100 p-2 p-md-4">
            <div class="row h-100 g-1 align-items-stretch">
                <!-- Sidebar Panle (buttons) -->
                <div id="sidebar-buttons"
                    class="col-12 col-md-auto mt-1 mt-md-1 d-none align-middle align-self-start align-self-md-stretch">
                    <div class="d-flex flex-md-column flex-row bg-dark rounded gap-2 h-100 pt-md-0 w-100 w-md-auto">
                        <a href="/home"
                            class="btn text-white d-flex align-items-center justify-content-center shadow-none focus-ring-0"
                            title="Home">
                            <img src="public/breba_icon_dark.png" alt="Home" width="24" height="24">
                        </a>
                        <button id="toggle-products" type="button" class="btn text-white shadow-none focus-ring-0 rounded-0"
                            title="Products">
                            <span class="icon">&#x1F5C2;</span>
                        </button>
                        <button id="toggle-builder" class="btn text-white focus-ring-0 shadow-none rounded-0"
                            title="Open Builder">
                            <span class="icon">&#x1F4C4;</span>
                        </button>
                        <button id="toggle-deploy" class="btn text-white shadow-none focus-ring-0 rounded-0" title="Deploy App">
                            <span class="icon">&#x1F680;</span>
                        </button>
                        <button id="toggle-templates" class="btn text-white shadow-none focus-ring-0 rounded-0" title="Templates">
                            <span class="icon">&#x1F4C1;</span>
                        </button>
                    </div>
                </div>
                <!-- Left Panels (inputs)-->
                <div id="left-panels" class="col-12 col-md-4 d-flex flex-column">
                    <div class="panel-overlay"></div>
                    <!-- Side panels positioned relative to #left-panels -->
                    <div id="input-panel" class="panel left-panel flex-fill d-flex flex-column overflow-auto bg-white w-100 border shadow rounded-3">
                        {% include "input.html" %}
                    </div>
                    <div id="builder-panel" class="panel left-panel flex-fill d-flex flex-column overflow-auto d-none bg-white w-100 border shadow rounded-3 p-3">
                        {% include "builder.html" %}
                    </div>
                    <div id="deploy-panel" class="panel left-panel flex-fill d-flex flex-column overflow-auto d-none bg-white w-100 border shadow rounded-3 p-3">
                        {% include "deploy.html" %}
                    </div>
                    <div id="templates-panel"
                        class="panel left-panel flex-fill d-flex flex-column overflow-auto d-none bg-white w-100 border shadow rounded-3 p-3">
                        {% include "templates.html" %}
                    </div>
                    <div id="products-panel" class="panel left-panel flex-fill d-flex flex-column overflow-auto d-none bg-white w-100 border shadow rounded-3 p-3">
                        {% include "products.html" %}
                    </div>
                </div>

                <!-- Generator Panel (with a generated website)-->
                <div id="right-panel" class="col-12 col-md d-flex flex-column">
                    <div id="generator-panel" class="panel flex-fill d-flex flex-column overflow-auto bg-white w-100 border shadow rounded-3 position-relative">
                        {% include "generator.html" %}
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const D_NONE = "d-none";
                const inputTab = document.querySelector('#input-panel');
                const leftContainer = document.getElementById('left-panels');
                function setLeftMinHeight() {
                    if (!leftContainer) return;
                    leftContainer.classList.add('min-66');
                }
                function triggerOverlay() {
                    const HOLD_MS = 180;
                    if (!leftContainer) return;
                    void leftContainer.offsetHeight;
                    leftContainer.classList.add('reveal-overlay');
                    setTimeout(() => {
                        leftContainer.classList.remove('reveal-overlay');
                    }, HOLD_MS);
                }
                // initialize
                setLeftMinHeight();

                function showOnlyOnePanel(panelToShow) {
                    document.querySelectorAll('.left-panel').forEach(panel => {
                        const buttonId = 'toggle-' + panel.id.replace('-panel', '');
                        const button = document.getElementById(buttonId);
                        if (panel === panelToShow) {
                            if (panel.classList.contains(D_NONE)) {
                                panel.classList.remove(D_NONE);
                            }
                            if (button) button.classList.add('active');
                            triggerOverlay();
                        } else {
                            panel.classList.add(D_NONE);
                            if (button) button.classList.remove('active');
                        }
                    });
                }


                function togglePanel(panel) {
                    const isVisible = !panel.classList.contains(D_NONE);
                    const buttonId = 'toggle-' + panel.id.replace('-panel', '');
                    const button = document.getElementById(buttonId);
                    if (isVisible) {
                        panel.classList.add(D_NONE);
                        if (button) button.classList.remove('active');
                        inputTab.classList.remove(D_NONE);
                        triggerOverlay();
                    } else {
                        panel.classList.remove(D_NONE);
                        inputTab.classList.add(D_NONE);
                        showOnlyOnePanel(panel);
                    }
                    setLeftMinHeight();
                }

                // Generic toggle for all panel buttons
                document.querySelectorAll('[id^="toggle-"]').forEach(button => {
                    button.addEventListener("click", () => {
                        const panelName = button.id.replace('toggle-', '');
                        const panel = document.getElementById(panelName + '-panel');
                        if (panel) togglePanel(panel);
                    });
                });

                // Template selection logic
                document.querySelectorAll(".start-template").forEach(button => {
                    button.addEventListener("click", async () => {
                        const templateName = button.dataset.template;

                        const cards = document.getElementById("template-cards");
                        const iframe = document.getElementById("generator-frame");

                        // Hide cards and show iframe
                        if (cards) cards.style.display = "none";
                        if (iframe) iframe.style.display = "block";

                        const chat = document.getElementById('chainlit');
                        if (chat) {
                            chat.contentWindow.postMessage({
                                method: "load_template",
                                body: templateName
                            }, '*');
                        }
                    });
                });

                // Escape key closes all panels
                document.addEventListener("keydown", (event) => {
                    if (event.key === "Escape" || event.key === "Esc") {
                        showOnlyOnePanel(null);
                        inputTab.classList.remove(D_NONE);
                        triggerOverlay();
                        setLeftMinHeight();
                    }
                });
            });

            window.addEventListener('message', (event) => {
                if (event.data.method === "reload_product") {
                    document.location.reload();
                } else if (event.data.method === "logged_in") {
                    // Reveal generator + sidebar buttons

                    document.getElementById("left-panels").classList.add("col-md-4");
                    document.getElementById("right-panel").classList.remove("d-none");
                    document.getElementById("sidebar-buttons").classList.remove("d-none");
                }
            });
        </script>

    </body>

</html>
