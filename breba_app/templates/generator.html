<style>
    #generator-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    #generator-overlay {
        position: absolute;
        inset: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 220ms ease-in-out;
        overflow: hidden;
    }

    #generator-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    #generator-overlay::before,
    #generator-overlay::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
    }

    #generator-overlay::before {
        background: rgba(15, 23, 42, 0.85);
    }

    #generator-overlay::after {
        background: linear-gradient(100deg, rgba(148, 163, 184, 0) 0%, rgba(148, 163, 184, 0.55) 50%, rgba(148, 163, 184, 0) 100%);
        opacity: 0.35;
        transform: translateX(-60%);
        filter: blur(60px);
        animation: generator-shimmer 3.6s linear infinite;
        will-change: transform;
    }

    #generator-overlay .message {
        position: relative;
        color: #E2E8F0;
        font-weight: 500;
        font-size: 1.5rem;
        letter-spacing: 0.04em;
        padding: 1rem 2rem;
        border-radius: 12px;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(8px);
        background: linear-gradient(
                90deg,
                rgba(61, 80, 126, 0.2) 0%,
                rgba(96, 165, 250, 0.3) 50%,
                rgba(61, 80, 126, 0.2) 100%
        );
        background-size: 200% 100%;
        animation: shimmer-wave 2.5s ease-in-out infinite;
    }


    @keyframes shimmer-wave {
        0% {
            background-position: 200% 0;
        }
        100% {
            background-position: -200% 0;
        }
    }
</style>
<!-- Action Bar -->
<div id="action-bar" class="d-flex align-items-center gap-2 p-2 border-bottom bg-light">
    <div class="dropdown">
        <button id="versionDropdown"
                class="btn btn-version dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
            <span id="versionLabel">v? • Latest</span>
        </button>
        <ul id="versionMenu" class="dropdown-menu shadow-sm"></ul>
    </div>

    <!-- Follow-up buttons container -->
    <div id="followup-buttons" class="position-relative ms-3 follow-up-btn-container"></div>
</div>

<div id="generator-wrapper" class="position-relative w-100 h-100">
    <iframe id="generator-frame" class="w-100 h-100 d-block position-relative"></iframe>


    <div id="generator-overlay">
        <div class="shimmer"></div>
        <div class="message">Please wait for the task to complete before doing anything else.</div>
        <span class="visually-hidden">Generating preview…</span>
    </div>
</div>

<script>
    const overlay = document.getElementById('generator-overlay');

    function showOverlay() {
        overlay.classList.add('active');
    }

    function hideOverlay() {
        overlay.classList.remove('active');
    }


    const iframe = document.getElementById('generator-frame');

    const popup = document.getElementById('popup');
    const input = document.getElementById('popup-input');
    const submit = document.getElementById('popup-submit');

    function hidePopup() {
        popup.style.display = 'none';
        delete popup.dataset.selection;
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();  // prevent any default form behavior
            submit.click();      // trigger your submit‐button handler
        }
    });

    function popupMouseUpHandler(sel, relLeft, relTop) {
        if (!sel) return;
        popup.style.visibility = 'hidden';
        popup.style.display = 'block';

        const fRect = iframe.getBoundingClientRect();

        // ideal absolute coords
        const absLeft = window.scrollX + fRect.left + relLeft;
        const absTop = window.scrollY + fRect.top + relTop;

        // clamp into viewport, to make sure the popup doesn't go outside the viewport
        const margin = 8;
        const vpW = document.documentElement.clientWidth;
        const vpH = document.documentElement.clientHeight;
        const popW = popup.offsetWidth;
        const popH = popup.offsetHeight;

        const left = Math.min(
            Math.max(absLeft, margin),
            vpW - popW - margin
        );
        const top = Math.min(
            Math.max(absTop, margin),
            vpH - popH - margin
        );


        // position & show
        popup.style.left = `${left}px`;
        popup.style.top = `${top}px`;
        popup.dataset.selection = sel;

        popup.style.visibility = 'visible';
        input.value = '';
        input.focus();

    }

    function popupMousedownHandler() {
        if (popup.style.display === 'block') {
            // we were visible → hide & suppress the very next mouseup
            hidePopup();
        }
    }


    submit.addEventListener('click', async () => {
        const query = input.value.trim();
        const selection = popup.dataset.selection;
        if (!query) return;

        const chat = document.getElementById('chainlit');
        if (chat) {
            const prompt = {
                method: "to_generator",
                body: "The user has highlighted the following text on the generated page: \"" + selection + "\".\n" +
                    "And made the following comment: " + query
            };
            chat.contentWindow.postMessage(prompt, '*');
        }

        // immediately hide
        popup.style.display = 'none';
    });

    function reload_preview(src) {
        // Base URL to start from: override if provided, else current iframe src
        const base = src || iframe.src;

        // Use URL so we preserve existing query params correctly
        const url = new URL(base, window.location.href);

        // Cache-bust (set/replace t)
        url.searchParams.set("t", Date.now().toString());
        console.log("Setting iframe src to " + url.toString());

        iframe.src = url.toString();
    }


    // Promise-based mutex for processChunk
    let chunkLock = Promise.resolve();

    function processChunkLocked(chunk) {
        // Chain onto the previous promise
        chunkLock = chunkLock
            .then(() => {
                // If processChunk ever becomes async, this still works
                return Promise.resolve(processChunk(chunk));
            })
            .catch(err => {
                console.error('Error in processChunk:', err);
            });
    }

    // 4) Click outside to cancel
    document.addEventListener('mousedown', e => {
        if (!popup.contains(e.target)) {
            popup.style.display = 'none';
        }
    });


    // ===== Versions dropdown state & rendering =====
    const versionsState = {
        active: null,
        list: []
    };

    function updateVersionLabel() {
        const label = document.getElementById('versionLabel');
        const v = versionsState.active;
        if (v !== undefined && v !== null) {
            const isLatest = v === Math.max(...versionsState.list);
            label.textContent = `v${v}${isLatest ? " • Latest" : ""}`;
        } else {
            label.textContent = "Select version";
        }
    }

    function renderVersionsMenu() {
        const menu = document.getElementById('versionMenu');
        menu.innerHTML = '';

        versionsState.list.sort((a, b) => b - a).forEach(v => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.className = 'dropdown-item';
            if (v === versionsState.active) a.classList.add('active');
            a.href = '#';
            a.textContent = `Version ${v}${v === Math.max(...versionsState.list) ? " - Latest" : ""}`;
            a.addEventListener('click', e => {
                e.preventDefault();
                if (v === versionsState.active) return;
                versionsState.active = v;
                updateVersionLabel();
                renderVersionsMenu();

                const chat = document.getElementById('chainlit');
                if (chat && chat.contentWindow) {
                    chat.contentWindow.postMessage({method: 'select_version', body: v}, '*');
                }
            });
            li.appendChild(a);
            menu.appendChild(li);
        });

        updateVersionLabel();
    }

    window.addEventListener('message', (event) => {
        if (event.data.method === 'update_versions_list') {
            const {versions, active} = event.data.body;
            versionsState.list = Array.isArray(versions) ? versions : [];
            versionsState.active = active;
            renderVersionsMenu();
        }
    });


    function renderFollowUpButtons(questions) {
        const container = document.getElementById('followup-buttons');
        if (!container) return;

        container.innerHTML = '';

        questions.forEach((question, idx) => {
            const btn = document.createElement('button');
            btn.className = 'follow-up-btn';
            btn.style.left = `${10 + idx * 50}px`;
            btn.title = question.title || '';
            btn.dataset.followUpQuestion = question.question || '';
            btn.innerHTML = '<span class="material-icons">lightbulb_outline</span>';
            // Attach click handler directly to this button
            btn.addEventListener('click', () => {
                const chat = document.getElementById('chainlit');
                if (chat) {
                    chat.contentWindow.postMessage({
                        method: "to_builder",
                        body: question.question
                    }, '*');
                }
            });
            container.appendChild(btn);
        });
    }


    window.addEventListener('message', (event) => {
        if (event.data.method === 'update_follow_up_questions_list') {
            const questions_list = event.data.body || [];
            renderFollowUpButtons(questions_list);
        } else if (event.data.method === "to_generator") {
            console.log('Generator panel message:', event.data);
            processChunkLocked(event.data.body);
        } else if (event.data.method === "load_preview") {
            console.log('Loading product preview', event.data);
            reload_preview(event.data.url)
        } else if (event.data.method === "refresh_preview") {
            console.log('Refreshing preview', event.data);
            reload_preview()
        } else if (event.data.method === "task_started") {
            showOverlay();
        } else if (event.data.method === "task_completed") {
            hideOverlay();
        } else if (event.data.method === "preview_mouseup") {
            popupMouseUpHandler(event.data.selection, event.data.left, event.data.top)
        } else if (event.data.method === "preview_mousedown") {
            console.log("Preview Mouse down");
            popupMousedownHandler();
        }
    });

</script>
