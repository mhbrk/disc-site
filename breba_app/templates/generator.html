<!-- Action Bar -->
<div id="action-bar" class="d-flex align-items-center gap-2 p-2 border-bottom bg-light">
    <div class="dropdown">
        <button id="versionDropdown"
                class="btn btn-version dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
            <span id="versionLabel">v? • Latest</span>
        </button>
        <ul id="versionMenu" class="dropdown-menu shadow-sm"></ul>
    </div>

    <!-- Follow-up buttons container -->
    <div id="followup-buttons" class="position-relative ms-3 follow-up-btn-container"></div>
</div>

<iframe id="generator-frame" class="w-100 h-100 d-block"></iframe>

<div id="spinner"
     class="position-absolute top-50 start-50 d-none"
     style="z-index: 200;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script>
    let reloadTimeoutId = null;

    function reload() {
        // reload only at certain internvals. This allows for contents to load before reading currentContent. (Chrome bug)
        if (reloadTimeoutId === null) {
            reloadTimeoutId = setTimeout(() => {
                try {
                    const currentContent = doc.documentElement.outerHTML;
                    console.log("currentContent: " + currentContent)
                    const pNode = iframe.parentNode
                    pNode.removeChild(iframe);
                    pNode.appendChild(iframe);
                    doc = iframe.contentWindow.document;
                    doc.open();
                    doc.write(currentContent);
                    doc.close();
                } catch (err) {
                    console.error("Reload failed:", err);
                } finally {
                    reloadTimeoutId = null
                }
            }, 500);
        } else {
            console.info("Reload is already scheduled")
        }
    }

    function processChunk(chunk) {
        console.log("chunk:" + chunk);

        const spinner = document.getElementById('spinner');
        spinner.classList.remove('d-none');

        // Check for image references
        const imageUrls = [
            ...chunk.matchAll(/["'](https?:\/\/cdn\.breba\.app\/[^"']+\.(?:jpg|jpeg|png|webp|gif))["']/gi),
        ].map(match => match[1]);

        for (const imageUrl of imageUrls) {
            setTimeout(async () => {
                const res = await fetch(imageUrl + "?v=" + Date.now(), {method: 'HEAD'});
                // Only reload if image is not ready
                if (!res.ok) {
                    // Start polling every 5 seconds
                    const intervalId = setInterval(async () => {
                        try {
                            const res = await fetch(imageUrl + "?v=" + Date.now(), {method: 'HEAD'});
                            if (res.ok) {
                                clearInterval(intervalId);
                                console.log(`Image ${imageUrl} loaded — triggering reload`);
                                if (!docOpened) {
                                    reload();
                                }
                            } else {
                                console.log(`Image ${imageUrl} not ready yet (status: ${res.status})`);
                            }
                        } catch (e) {
                            console.log(`Error checking image ${imageUrl}:`, e);
                        }
                    }, 5000);
                } else {
                    console.log(`Image ${imageUrl} already loaded`);
                }
            }, 1);
        }

        if (chunk === "__completed__") {
            if (docOpened) {
                console.log("chunk completed");
                doc.close();
                docOpened = false;
                // Need to wait for page tha loads slowly
                setTimeout(reload, 100)
            }
            spinner.classList.add('d-none');
            return;
        }

        if (!docOpened) {
            // Initialize iframe content when first chunk arrives
            console.log("chunk opened");
            doc.open();
            docOpened = true;
        }

        doc.write(chunk.trim());
    }

    const iframe = document.getElementById('generator-frame');

    let docOpened = false;
    let doc = iframe.contentWindow.document;

    const popup = document.getElementById('popup');
    const input = document.getElementById('popup-input');
    const submit = document.getElementById('popup-submit');
    let suppressNextMouseup = false;

    function hidePopup() {
        popup.style.display = 'none';
        delete popup.dataset.selection;
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();  // prevent any default form behavior
            submit.click();      // trigger your submit‐button handler
        }
    });

    // 1) Inject listener into iframe on load
    iframe.addEventListener('load', () => {
        const win = iframe.contentWindow;
        const doc = win.document;

        doc.addEventListener('mouseup', () => {
            if (suppressNextMouseup) {
                // clear the flag and bail out once
                suppressNextMouseup = false;
                return;
            }
            const sel = win.getSelection().toString().trim();
            if (!sel) return;

            popup.style.visibility = 'hidden';
            popup.style.display = 'block';

            // get the bounding rect of the selection
            const range = win.getSelection().getRangeAt(0);
            const r = range.getBoundingClientRect();
            const fRect = iframe.getBoundingClientRect();

            // ideal absolute coords
            const absLeft = window.scrollX + fRect.left + r.left;
            const absTop = window.scrollY + fRect.top + r.bottom + 5;

            // clamp into viewport
            const margin = 8;
            const vpW = document.documentElement.clientWidth;
            const vpH = document.documentElement.clientHeight;
            const popW = popup.offsetWidth;
            const popH = popup.offsetHeight;

            const left = Math.min(
                Math.max(absLeft, margin),
                vpW - popW - margin
            );
            const top = Math.min(
                Math.max(absTop, margin),
                vpH - popH - margin
            );

            // position & show
            popup.style.left = `${left}px`;
            popup.style.top = `${top}px`;
            popup.dataset.selection = sel;

            popup.style.visibility = 'visible';
            input.value = '';
            input.focus();
        });

        doc.addEventListener('mousedown', () => {
            if (popup.style.display === 'block') {
                // we were visible → hide & suppress the very next mouseup
                hidePopup();
                suppressNextMouseup = true;
            } else {
                // already hidden → don’t suppress mouseup
                suppressNextMouseup = false;
            }
        });
    });

    // 3) Submit handler: fire request, then hide popup
    submit.addEventListener('click', async () => {
        const query = input.value.trim();
        const selection = popup.dataset.selection;
        if (!query) return;

        const chat = document.getElementById('chainlit');
        if (chat) {
            const prompt = {
                method: "to_generator",
                body: "The user has highlighted the following text on the generated page: \"" + selection + "\".\n" +
                    "And made the following comment: " + query
            };
            chat.contentWindow.postMessage(prompt, '*');
        }

        // immediately hide
        popup.style.display = 'none';
    });


    // Promise-based mutex for processChunk
    let chunkLock = Promise.resolve();

    function processChunkLocked(chunk) {
        // Chain onto the previous promise
        chunkLock = chunkLock
            .then(() => {
                // If processChunk ever becomes async, this still works
                return Promise.resolve(processChunk(chunk));
            })
            .catch(err => {
                console.error('Error in processChunk:', err);
            });
    }

    // Updates to builder panel
    window.addEventListener('message', (event) => {
        if (event.data.method === "to_generator") {
            console.log('Generator panel message:', event.data);
            processChunkLocked(event.data.body);
        }
    });


    // 4) Click outside to cancel
    document.addEventListener('mousedown', e => {
        if (!popup.contains(e.target)) {
            popup.style.display = 'none';
        }
    });


    // ===== Versions dropdown state & rendering =====
    const versionsState = {
        active: null,
        list: []
    };

    function updateVersionLabel() {
        const label = document.getElementById('versionLabel');
        const v = versionsState.active;
        if (v !== undefined && v !== null) {
            const isLatest = v === Math.max(...versionsState.list);
            label.textContent = `v${v}${isLatest ? " • Latest" : ""}`;
        } else {
            label.textContent = "Select version";
        }
    }

    function renderVersionsMenu() {
        const menu = document.getElementById('versionMenu');
        menu.innerHTML = '';

        versionsState.list.sort((a, b) => b - a).forEach(v => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.className = 'dropdown-item';
            if (v === versionsState.active) a.classList.add('active');
            a.href = '#';
            a.textContent = `Version ${v}${v === Math.max(...versionsState.list) ? " - Latest" : ""}`;
            a.addEventListener('click', e => {
                e.preventDefault();
                if (v === versionsState.active) return;
                versionsState.active = v;
                updateVersionLabel();
                renderVersionsMenu();

                const chat = document.getElementById('chainlit');
                if (chat && chat.contentWindow) {
                    chat.contentWindow.postMessage({method: 'select_version', body: v}, '*');
                }
            });
            li.appendChild(a);
            menu.appendChild(li);
        });

        updateVersionLabel();
    }

    window.addEventListener('message', (event) => {
        if (event.data.method === 'update_versions_list') {
            const {versions, active} = event.data.body;
            versionsState.list = Array.isArray(versions) ? versions : [];
            versionsState.active = active;
            renderVersionsMenu();
        }
    });


    function renderFollowUpButtons(questions) {
        const container = document.getElementById('followup-buttons');
        if (!container) return;

        container.innerHTML = '';

        questions.forEach((question, idx) => {
            const btn = document.createElement('button');
            btn.className = 'follow-up-btn';
            btn.style.left = `${10 + idx * 50}px`;
            btn.title = question.title || '';
            btn.dataset.followUpQuestion = question.question || '';
            btn.innerHTML = '<span class="material-icons">lightbulb_outline</span>';
            // Attach click handler directly to this button
            btn.addEventListener('click', () => {
                const chat = document.getElementById('chainlit');
                if (chat) {
                    chat.contentWindow.postMessage({
                        method: "to_builder",
                        body: question.question
                    }, '*');
                }
            });
            container.appendChild(btn);
        });
    }


    window.addEventListener('message', (event) => {
        if (event.data.method === 'update_follow_up_questions_list') {
            const questions_list = event.data.body || [];
            renderFollowUpButtons(questions_list);
        }
    });

</script>
